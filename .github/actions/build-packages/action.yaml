---
name: Package builder

permissions : {}

description: Build instawow packages.
inputs:
  python-version:
    required: false
    default: "3.13"
    description: The Python version to use.
outputs:
  version:
    value: ${{ steps.get-version.outputs.version }}
    description: instawow version.
runs:
  using: composite
  steps:
    - name: Install uv for Python ${{ inputs.python-version }}
      uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install nox
      run: uv tool install -p ${INPUTS_PYTHON_VERSION} nox
      shell: bash
      env:
        UV_MANAGED_PYTHON: "1"
        INPUTS_PYTHON_VERSION: ${{ inputs.python-version }}
    - name: Install Node
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: "22"
    - name: Build packages
      run: >-
        nox
        --error-on-missing-interpreters
        --force-python ${INPUTS_PYTHON_VERSION}
        -s build_dists-${INPUTS_PYTHON_VERSION}
      shell: bash
      env:
        INPUTS_PYTHON_VERSION: ${{ inputs.python-version }}
    - name: Get version
      id: get-version
      run: |
        echo "version=$(jq -r '."version"' dist/instawow/.wheel-metadata.json)" >> $GITHUB_OUTPUT
      shell: bash
    - name: Upload artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: packages
        path: ./dist
        if-no-files-found: error
        include-hidden-files: true
